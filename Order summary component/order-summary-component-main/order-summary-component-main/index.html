 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="Order_summary_component.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>
<body>
<div class="card">
  <img class="img_hero" src="./images/illustration-hero.svg">
  <a class="Order">Order Summary</a><br>
  <a class="you">You can now listen to millions of songs, audiobooks, and podcasts on any 
  device anywhere you like!</a>

<div class="plan_card">
  <div class="icon_container">
    <img src="./images/icon-music.svg">
  </div>
  
  <div class="plan-info">
    <div class="plan_title">Annual Plan</div>
    <div class="plan_price">$59.99/year</div>
  </div>

  <a href="link_to_change" class="change_link">Change</a>
</div>


<div class="Payment">  
  <button class="Pay">
    Proceed to Payment
  </button>
</div>
  <button class="Cancel">Cancel Order</button>

</div>

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>-->

</body>
</html>
